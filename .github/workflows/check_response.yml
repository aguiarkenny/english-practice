name: Check for Email Response

on:
  schedule:
    # Run every 2 hours on weekdays between 07:00 and 23:00 BRT (10:00–02:00 UTC)
    - cron: "0 10,12,14,16,18,20,22,0 * * 1-5"
  workflow_dispatch:

jobs:
  check-and-evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Check inbox and evaluate response
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IMAP_HOST: imap.gmail.com
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python scripts/check_and_evaluate.py

      - name: Commit updated state
        run: |
          git config user.name "english-practice-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/state.json
          git diff --cached --quiet || git commit -m "chore: update state after evaluation [skip ci]"
          git push
